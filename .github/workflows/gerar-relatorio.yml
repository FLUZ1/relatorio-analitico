name: Gerar Relatório Analítico

on:
  push:
    branches: [ main ]
    paths:
      - 'dados/**'
  workflow_dispatch:

env:
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 👈 Adicionado para usar Node 24

jobs:
  generate-report:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # Versão atualizada

    - name: Set up Python
      uses: actions/setup-python@v5  # Versão atualizada
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run analysis**
