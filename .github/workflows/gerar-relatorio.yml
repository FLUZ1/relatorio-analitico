name: Gerar Relatório Analítico

on:
  push:
    branches: [ main ]
    paths:
      - 'dados/**'
  workflow_dispatch:

env:
  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Copy JSONL data files to working directory
      run: |
        cp dados/*.jsonl . 2>/dev/null || echo "Nenhum .jsonl encontrado em dados/"

    - name: Run analysis
      run: |
        python "src/6-RELATORIO ANALITICO.py"

    - name: Upload generated reports
      uses: actions/upload-artifact@v4
      with:
        name: relatorios-analiticos-${{ github.run_number }}
        path: relatorios_analiticos/
        retention-days: 30
        if-no-files-found: warn
