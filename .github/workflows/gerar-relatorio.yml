name: Gerar Relatório Analítico

on:
  push:
    branches: [ main ]
    paths:
      - 'dados/**'
  workflow_dispatch:

env:
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

jobs:
  generate-report:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run analysis script
      run: |
        cd src
        python 6-RELATORIO_ANALITICO.py

    - name: Upload reports as artifacts
      uses: actions/upload-artifact@v3
      with:
        name: relatorios-gerados
        path: relatorios_analiticos/

    - name: Commit and push generated reports
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git commit -m "Atualizar relatórios gerados" || echo "Nenhuma mudança para commitar"
        git push
